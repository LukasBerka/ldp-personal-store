services:
  pod:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      LDP_BASE_URI: "http://localhost:8000/"
      LDP_ADMIN_TOKEN: ${LDP_ADMIN_TOKEN:?set LDP_ADMIN_TOKEN before starting the pod}
    volumes:
      - pod-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')
      interval: 30s
      timeout: 3s
      start_period: 5s
    restart: unless-stopped

volumes:
  pod-data:
