[project]
name = "ldp_view_engine"
version = "0.1.0"
description = "The view engine: named, parameterized SPARQL CONSTRUCT views over any standard LDP + SPARQL 1.1 storage"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.136.3",
    "httpx>=0.28.1",
    "rdflib>=7.6.0",
    "ldp_common",
]

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.uv.sources]
ldp_common = { workspace = true }
