[project]
name = "ldp_common"
version = "0.1.0"
description = "Shared library for the Personal LDP Pod: vocab, config, RDF content, token/view models"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.136.3",
    "pydantic-settings>=2.14.1",
    "rdflib>=7.6.0",
]

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
